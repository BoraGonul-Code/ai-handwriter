<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Handwriter - Pro Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="style.css?v=5">
</head>

<body class="bg-slate-100 text-slate-800 p-8 flex flex-col items-center min-h-screen">

    <!-- Document Editor -->
    <div id="step2-container" class="w-full flex-col flex items-center mt-12">

        <div
            class="w-full max-w-4xl flex flex-col sm:flex-row justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-md border-t-4 border-indigo-500">
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full">
                <input type="file" id="pdfIn"
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition cursor-pointer">
            </div>

            <!-- Calligrapher Engine Controls -->
            <div class="flex items-center gap-4 bg-slate-50 px-4 py-2 rounded-lg ml-0 sm:ml-4 mt-4 sm:mt-0 border border-slate-200">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Style</label>
                    <select id="myInputStyle" class="text-sm border-b-2 border-indigo-200 bg-transparent focus:outline-none focus:border-indigo-600 pb-1">
                        <option value="0">Style 1</option>
                        <option value="2">Style 3</option>
                        <option value="4" selected>Style 5</option>
                        <option value="5">Style 6</option>
                        <option value="30">Style 7</option>
                        <option value="11">Style 8</option>
                        <option value="21">Style 9</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1 w-24">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Bias</label>
                    <input type="range" id="myInputBias" min="0.15" max="2.5" step="0.05" value="0.75" class="w-full accent-indigo-600">
                </div>
            </div>

            <button id="finish"
                class="bg-green-600 text-white px-8 py-2.5 rounded-full font-bold hidden shadow-lg hover:bg-green-700 mt-4 sm:mt-0 ml-0 sm:ml-4 whitespace-nowrap transition">
                Print All to PDF
            </button>
        </div>

        <div id="controls"
            class="hidden flex space-x-6 mb-4 items-center bg-white px-6 py-2 rounded-full shadow-sm border border-slate-200">
            <button id="prevBtn" class="text-indigo-600 font-bold hover:text-indigo-800 transition">← Previous</button>
            <span id="pageInfo" class="font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-md">Page 1</span>
            <button id="nextBtn" class="text-indigo-600 font-bold hover:text-indigo-800 transition">Next →</button>
        </div>

        <div id="box-toolbar" class="hidden">
            <span class="font-bold text-sm text-slate-300 mr-2">Selected Box:</span>
            <input type="text" id="customPrompt" placeholder="Ex: Just write x=5..."
                class="bg-slate-700 text-white px-3 py-1.5 rounded text-sm w-48 outline-none focus:ring-2 focus:ring-blue-500">
            <button id="reSolveBtn"
                class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded text-sm font-bold transition">Solve
                Again</button>
            <div class="w-px h-6 bg-slate-600 mx-1"></div>
            <button id="deleteBoxBtn"
                class="bg-red-500 hover:bg-red-400 px-4 py-1.5 rounded text-sm font-bold transition flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
                Delete
            </button>
            <button id="closeToolbarBtn" class="ml-2 text-slate-400 hover:text-white transition">✕</button>
        </div>

        <div id="container" class="hidden bg-white shadow-2xl rounded-sm border border-slate-300 relative">
            <canvas id="pdfCanvas" class="rounded-sm"></canvas>
            <div id="selection" class="absolute bg-blue-500 bg-opacity-20 border-2 border-blue-500 hidden z-10"></div>
            <div id="preview-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-20"></div>
        </div>
        
        <!-- HIDDEN CALLIGRAPHER ENGINE RENDERER -->
        <div id="svg-sandbox" style="position: absolute; top:-9999px; left:-9999px; visibility:hidden;"></div>
        
        <!-- PHANTOM DOM BRIDGE: Tricks the Minified Neural Network into running -->
        <div id="phantom-neural-bridge" style="display:none;">
            <svg id="canvas" width="1240" height="800"></svg>
            <select id="select-style"><option value="4" selected></option></select>
            <input id="bias-slider" type="range" value="0.75"/>
            <input id="speed-slider" type="range" value="1"/>
            <input id="width-slider" type="range" value="1"/>
            <input id="text-input" type="text" value=""/>
            <button id="draw-button"></button>
            <button id="save-button"></button>
            <div id="loading-indicator"></div>
        </div>
    </div>

    <script src="headless_engine.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

// --- PHANTOM BRIDGE: Commandeers the legacy minified engine ---
window.initCalligrapher = function(style, bias) {
    document.getElementById('select-style').value = style;
    document.getElementById('bias-slider').value = bias;
};
window.generate_text = function(text) {
    document.getElementById('text-input').value = text;
    // Simulate a user click to trigger the minified script's 'E()' function
    document.getElementById('draw-button').dispatchEvent(new MouseEvent('mousedown'));
};
window.get_svg_path = function() {
    const canvas = document.getElementById('canvas');
    const paths = Array.from(canvas.querySelectorAll('path'));
    if (paths.length > 0) {
        const fullD = paths.map(p => p.getAttribute('d')).join(' ');
        canvas.innerHTML = ''; // Wipe canvas clean for the next text chunk
        return fullD;
    }
    return null;
};
// --------------------------------------------------------------

let pdfDoc = null, pageNum = 1, scale = 1.3, viewport = null;
let boxes = [], isDrawing = false, startX, startY;
let activeBoxId = null; // Holds the currently selected box ID

const canvas = document.getElementById('pdfCanvas'), ctx = canvas.getContext('2d');
const cont = document.getElementById('container'), sel = document.getElementById('selection');
const toolbar = document.getElementById('box-toolbar');

function calculateScale(page) {
    // Calculate optimal scale based on window width (leave some margin)
    const margin = 100; // 50px each side
    const availableWidth = window.innerWidth - margin;
    const defaultViewport = page.getViewport({ scale: 1.0 });
    let newScale = availableWidth / defaultViewport.width;

    // Don't upscale too much or downscale too tiny
    if (newScale > 1.8) newScale = 1.8;
    if (newScale < 0.6) newScale = 0.6;

    return newScale;
}

document.getElementById('pdfIn').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function () {
        pdfjsLib.getDocument(new Uint8Array(this.result)).promise.then(pdf => {
            pdfDoc = pdf; cont.classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            render();
        });
    };
    reader.readAsArrayBuffer(file);
};

function render() {
    pdfDoc.getPage(pageNum).then(page => {
        scale = calculateScale(page); // Dynamically set scale
        viewport = page.getViewport({ scale });
        canvas.height = viewport.height; canvas.width = viewport.width;
        page.render({ canvasContext: ctx, viewport }).promise.then(showPageBoxes);
        document.getElementById('pageInfo').innerText = `Page ${pageNum} / ${pdfDoc.numPages}`;
        hideToolbar();
    });
}

// Re-render when window is resized
let resizeTimeout;
window.addEventListener('resize', () => {
    if (!pdfDoc) return;
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        render();
    }, 200); // Debounce to prevent lag
});

document.getElementById('prevBtn').onclick = () => { if (pageNum > 1) { pageNum--; render(); } };
document.getElementById('nextBtn').onclick = () => { if (pageNum < pdfDoc.numPages) { pageNum++; render(); } };

// DRAWING OPERATIONS
cont.onmousedown = e => {
    if (e.target !== canvas && e.target !== cont) return;
    hideToolbar(); // Close toolbar when starting a new drawing
    isDrawing = true; const r = cont.getBoundingClientRect();
    startX = e.clientX - r.left; startY = e.clientY - r.top;
    sel.style.left = startX + 'px'; sel.style.top = startY + 'px';
    sel.style.width = '0'; sel.style.height = '0'; sel.style.display = 'block';
};

cont.onmousemove = e => {
    if (!isDrawing) return; const r = cont.getBoundingClientRect();
    const curX = e.clientX - r.left, curY = e.clientY - r.top;
    sel.style.width = Math.abs(curX - startX) + 'px'; sel.style.height = Math.abs(curY - startY) + 'px';
    sel.style.left = Math.min(startX, curX) + 'px'; sel.style.top = Math.min(startY, curY) + 'px';
};

cont.onmouseup = async e => {
    if (!isDrawing) return; isDrawing = false;
    const r = cont.getBoundingClientRect();
    const fX = Math.min(startX, e.clientX - r.left), fY = Math.min(startY, e.clientY - r.top);
    const fW = Math.abs((e.clientX - r.left) - startX), fH = Math.abs((e.clientY - r.top) - startY);
    sel.style.display = 'none';
    if (fW < 15 || fH < 15) return;

    // Prompt user for custom instructions immediately after drawing the box
    let customInst = prompt("Custom AI Instruction (e.g. 'Keep it under 10 words'. Leave blank for default):", "");
    if (customInst === null) return; // User cancelled the box creation entirely

    const box = {
        id: Date.now(), x: fX / scale, y: fY / scale, w: fW / scale, h: fH / scale,
        page: pageNum, canvasX: fX, canvasY: fY, canvasW: fW, canvasH: fH,
        answer: "AI is thinking...", customPrompt: customInst
    };
    boxes.push(box);
    showPageBoxes();
    await fetchSolution(box);
    document.getElementById('finish').classList.remove('hidden');
};

// -------------------------------------------------------------
// CALLIGRAPHER VIRTUAL ENGINE (PHASE 7 INTEGRATION)
// -------------------------------------------------------------
let isGeneratingHandwriting = false;
let handwritingQueue = [];

async function processHandwritingQueue() {
    if (isGeneratingHandwriting || handwritingQueue.length === 0) return;
    isGeneratingHandwriting = true;

    const task = handwritingQueue.shift();
    try {
        const base64Png = await generateFlawlessHandwriting(task.text, task.tWidth, task.tHeight, task.styleNum, task.stokeBias);
        task.resolve(base64Png);
    } catch (e) {
        console.error("Engine Queue Error:", e);
        // Ensure failure doesn't halt the rest of the app
        task.resolve(null); 
    } finally {
        isGeneratingHandwriting = false;
        processHandwritingQueue(); // Execute next box in line
    }
}

function queueHandwritingGeneration(text, tWidth, tHeight, styleNum, stokeBias) {
    return new Promise((resolve, reject) => {
        handwritingQueue.push({text, tWidth, tHeight, styleNum, stokeBias, resolve, reject});
        processHandwritingQueue();
    });
}

async function fetchSolution(boxObj) {
    const fd = new FormData();
    fd.append("file", document.getElementById('pdfIn').files[0]);
    fd.append("box", JSON.stringify(boxObj));

    try {
        const res = await fetch('/solve/', { method: 'POST', body: fd });
        const data = await res.json();
        const rawAns = data.answer;
        
        // 1. Visually update UI so user knows Groq finished
        boxObj.answer = "Synthesizing handwriting..."; 
        showPageBoxes();

        // 2. Trigger Neural Network locally in the browser via Mutex Queue
        const style = parseInt(document.getElementById('myInputStyle').value) || 4;
        const bias = parseFloat(document.getElementById('myInputBias').value) || 0.75;
        
        // Use queue string instead of raw function to prevent concurrent DOM destruction
        const base64Png = await queueHandwritingGeneration(rawAns, boxObj.canvasW, boxObj.canvasH, style, bias);
        
        // 3. Save Final State
        boxObj.answer = rawAns;
        boxObj.pngBase64 = base64Png; // Python will use this later!
        
    } catch (err) { 
        console.error("Groq/Net Error:", err);
        boxObj.answer = "An error occurred!"; 
    }
    showPageBoxes();
}

async function generateFlawlessHandwriting(text, tWidth, tHeight, styleNum, stokeBias) {
    const sandbox = document.getElementById('svg-sandbox');
    sandbox.innerHTML = ''; // Fresh workspace

    // 1. Initialize Neural Net Calligrapher API
    if (typeof window.initCalligrapher !== 'function') {
        alert("🚨 KRİTİK HATA: El Yazısı Motoru Yüklenemedi! Lütfen tarayıcınızda CTRL + SHIFT + R (veya CMD + SHIFT + R) tuşlarına basarak önbelleği tamamen silip sayfayı yenileyiniz.");
        return null;
    }
    document.getElementById('canvas').innerHTML = ''; // Defensive wipe of phantom neural engine canvas to prevent ghost overlaps
    window.initCalligrapher(styleNum, stokeBias);

    // Sanitize engine breaking characters
    text = text.replace(/[\n\r\t]/g, ' ').replace(/\s+/g, ' ').trim();

    // 2. Wrap text into lines based on target box aspect ratio logic
    let currentLines = [];
    const targetAR = Math.max(tWidth / tHeight, 1.0); // Minimum square geometry
    let charsPerLine = 15;
    let bestLines = [text];
    let words = text.split(' ');

    while (charsPerLine <= 85) { // Absolute max physical width constraint
        let testLines = [];
        let curL = "";
        for (let w of words) {
            if ((curL + w).length > charsPerLine && curL.length > 0) {
                testLines.push(curL.trim());
                curL = w + " ";
            } else {
                curL += w + " ";
            }
        }
        if (curL.trim()) testLines.push(curL.trim());
        bestLines = testLines;
        
        let numLines = Math.max(testLines.length, 1);
        
        // Exact geometric density formulas reverse-engineered from Calligrapher stroke bounds
        let expectedWidth = 20.5 * charsPerLine;
        let expectedHeight = (120 * numLines) + (5 * charsPerLine) - 100;
        let projectedAR = expectedWidth / Math.max(expectedHeight, 1);
        
        if (projectedAR >= targetAR) break; // Perfect match
        charsPerLine += 2; // Granular line widening
    }
    currentLines = bestLines;

    // 3. Create SVG Container
    const svgNS = 'http://www.w3.org/2000/svg';
    const finalSvg = document.createElementNS(svgNS, 'svg');
    const group = document.createElementNS(svgNS, 'g');
    
    let currentY = 100;
    const rowHeight = 150; // Internal SVG coordinate drop

    for (let line of currentLines) {
        const textChunk = line + " ";
        // Call asynchronous Neural Net Engine dispatcher
        const pathD = await new Promise(resolve => {
            const listener = () => { window.removeEventListener('calligrapher_done', listener); resolve(window.get_svg_path()); };
            window.addEventListener('calligrapher_done', listener);
            window.generate_text(textChunk);
        });

        if (!pathD) continue;

        // Dynamic Bounding Box Parser for absolute positioning (Protects against short-sentence origin jitter)
        let lineMinX = Infinity, lineMaxX = -Infinity, lineMinY = Infinity, lineMaxY = -Infinity;
        const coords = pathD.match(/[-+]?\d*\.?\d+(?:[eE][-+]?\d+)?/g);
        if (coords) {
            for (let i = 0; i < coords.length; i += 2) {
                const cx = parseFloat(coords[i]);
                if (i+1 >= coords.length) break;
                const cy = parseFloat(coords[i+1]);
                if (cx < lineMinX) lineMinX = cx;
                if (cx > lineMaxX) lineMaxX = cx;
                if (cy < lineMinY) lineMinY = cy;
                if (cy > lineMaxY) lineMaxY = cy;
            }
        }
        if (lineMinX === Infinity) { lineMinX = 0; lineMinY = 0; lineMaxY = 100; }
        
        const lineMidY = (lineMinY + lineMaxY) / 2;
        const engine_n = line.length + 2; 
        const engine_v = Math.min(105 / engine_n, 11);
        const scale_factor = 2.5 / engine_v;

        // Perfectly left-align and center-anchor every line dynamically! 
        const translateX = 10 - (lineMinX * scale_factor);
        const translateY = currentY - (lineMidY * scale_factor);
        
        const finalPath = document.createElementNS(svgNS, 'path');
        finalPath.setAttribute('d', pathD);
        finalPath.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale_factor})`);
        finalPath.style.fill = "none";
        finalPath.style.stroke = "#111b4d"; // Dark Blue Pen Ink
        finalPath.style.strokeWidth = `${2.0 / scale_factor}px`;

        group.appendChild(finalPath);
        currentY += rowHeight;
    }

    finalSvg.appendChild(group);
    sandbox.appendChild(finalSvg);

    // 4. Edge-to-Edge Dimension Math (Zero Centering Bug!)
    // getBBox() FAILS on hidden/off-screen SVGs in Chrome, returning 0 width.
    // We MUST calculate the exact mathematical bounds by parsing the paths manually.
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    
    const paths = group.querySelectorAll('path');
    paths.forEach(p => {
        // Extract the raw transformation scale and translation
        const transformStr = p.getAttribute('transform');
        let tX = 0, tY = 0, scale = 1;
        if (transformStr) {
            const translateMatch = transformStr.match(/translate\(([-\d.]+),\s*([- \d.]+)\)/);
            if (translateMatch) { tX = parseFloat(translateMatch[1]); tY = parseFloat(translateMatch[2]); }
            const scaleMatch = transformStr.match(/scale\(([-\d.]+)\)/);
            if (scaleMatch) { scale = parseFloat(scaleMatch[1]); }
        }

        // Parse every coordinate in the SVG Path 'd' attribute
        const dStr = p.getAttribute('d');
        if (!dStr) return;
        const coords = dStr.match(/[-+]?\d*\.?\d+(?:[eE][-+]?\d+)?/g);
        if (!coords) return;
        
        for (let i = 0; i < coords.length; i += 2) {
            // Apply scale and translation mathematically to find absolute screen coordinates
            const rawX = parseFloat(coords[i]);
            // SVG spec means occasionally a single 'Z' command might throw off parity,
            // but the regex mostly catches pairs safely for this specific calligraphy engine.
            if (i+1 >= coords.length) break; 
            const rawY = parseFloat(coords[i+1]);
            
            const absX = (rawX * scale) + tX;
            const absY = (rawY * scale) + tY;
            
            if (absX < minX) minX = absX;
            if (absX > maxX) maxX = absX;
            if (absY < minY) minY = absY;
            if (absY > maxY) maxY = absY;
        }
    });
    
    // Fallback if parsing failed
    if (minX === Infinity) { minX = 0; minY = 0; maxX = tWidth; maxY = tHeight; }
    
    const bx = minX, by = minY, bw = maxX - minX, bh = maxY - minY;
    
    // Strict SVG Viewport Crop (with 15px padding to preserve cursive loops)
    finalSvg.setAttribute('viewBox', `${bx - 15} ${by - 15} ${bw + 30} ${bh + 30}`);
    finalSvg.setAttribute('preserveAspectRatio', 'xMinYMin meet');
    
    // Set absolute physical SVG dimensions to match the DOM target box
    finalSvg.setAttribute('width', tWidth + 'px');
    finalSvg.setAttribute('height', tHeight + 'px');

    // 5. Convert SVG to high-res PNG
    return new Promise((resolve) => {
        const svgData = new XMLSerializer().serializeToString(finalSvg);
        const img = new Image();
        img.onload = () => {
            const tempCanvas = document.createElement('canvas');
            // We increase resolution artificially by scaling for high DPI PDF prints
            const dpiScale = 2; 
            tempCanvas.width = tWidth * dpiScale;
            tempCanvas.height = tHeight * dpiScale;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.scale(dpiScale, dpiScale);
            tCtx.drawImage(img, 0, 0, tWidth, tHeight);
            resolve(tempCanvas.toDataURL('image/png'));
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    });
}

// RENDERING BOXES ON SCREEN AND CLICK EVENTS
function showPageBoxes() {
    const layer = document.getElementById('preview-layer');
    layer.innerHTML = "";
    boxes.filter(b => b.page === pageNum).forEach(b => {
        // Recalculate canvas positions based on current scale
        b.canvasX = b.x * scale;
        b.canvasY = b.y * scale;
        b.canvasW = b.w * scale;
        b.canvasH = b.h * scale;

        const div = document.createElement('div');
        div.className = `preview-box ${b.id === activeBoxId ? 'active' : ''}`;
        div.style.left = b.canvasX + 'px'; div.style.top = b.canvasY + 'px';
        div.style.width = b.canvasW + 'px'; div.style.height = b.canvasH + 'px';
        div.style.fontSize = Math.max(12, (13 * scale * 0.8)) + 'px';
        
        // Show Handwriting Image if available, otherwise show the text (e.g. "AI is thinking...")
        if (b.pngBase64) {
            div.style.background = "transparent";
            div.style.border = b.id === activeBoxId ? "2px dashed #4f46e5" : "none";
            // The 'title' attribute gives us the perfect native tooltip the user asked for!
            div.title = b.answer; 
            div.innerHTML = `<img src="${b.pngBase64}" style="width:100%; height:100%; object-fit:contain; cursor:help;" draggable="false" />`;
            div.contentEditable = false;
        } else {
            div.innerText = b.answer;
            div.contentEditable = true;
            div.onblur = e => { b.answer = e.target.innerText; };
        }

        // Open toolbar when a box is clicked
        div.onclick = (e) => {
            e.stopPropagation(); // Prevent clicking on canvas
            activeBoxId = b.id;
            showPageBoxes(); // Re-render to update the active class
            showToolbar(b);
        };

        layer.appendChild(div);
    });

    if (boxes.length === 0) document.getElementById('finish').classList.add('hidden');
}

// TOOLBAR CONTROLS
function showToolbar(box) {
    document.getElementById('customPrompt').value = box.customPrompt || '';
    toolbar.style.display = 'flex';
}
function hideToolbar() {
    activeBoxId = null; toolbar.style.display = 'none'; showPageBoxes();
}

document.getElementById('closeToolbarBtn').onclick = hideToolbar;

document.getElementById('deleteBoxBtn').onclick = () => {
    boxes = boxes.filter(b => b.id !== activeBoxId);
    hideToolbar();
};

document.getElementById('reSolveBtn').onclick = async () => {
    let box = boxes.find(b => b.id === activeBoxId);
    if (!box) return;
    box.customPrompt = document.getElementById('customPrompt').value;
    box.answer = "Solving again...";
    showPageBoxes();
    await fetchSolution(box);
};

// FINALIZE
document.getElementById('finish').onclick = async () => {
    document.getElementById('finish').innerText = "Preparing...";
    const fd = new FormData();
    fd.append("file", document.getElementById('pdfIn').files[0]);
    
    // We pass the entire 'boxes' array. Each box now contains its own 
    // '.pngBase64' image string generated natively by the Calligrapher Engine in the browser!
    fd.append("results", JSON.stringify(boxes));

    const res = await fetch('/finalize/', { method: 'POST', body: fd });
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = window.URL.createObjectURL(blob);
    a.download = "homework_ready.pdf"; a.click();
    document.getElementById('finish').innerText = "Print All to PDF";
};

// APP INITIALIZATION COMPLETE
</script>
</body>

</html>
